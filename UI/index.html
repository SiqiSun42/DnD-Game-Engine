<!DOCTYPE html>
<html lang="zh-CN" data-color-theme="stars">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dungeon Master</title>
  <link rel="stylesheet" href="css/main.css">
  <link rel="stylesheet" href="css/themes.css">
  <link rel="stylesheet" href="css/markdown.css?v=7">
  <link rel="stylesheet" href="css/chat.css?v=10">
  <link rel="stylesheet" href="css/panels.css">
  <link rel="stylesheet" href="css/panels/character-panel.css">
  <link rel="stylesheet" href="css/panels/backpack-panel.css">
  <link rel="stylesheet" href="css/panels/status-panel.css">
  <link rel="stylesheet" href="css/panels/world-panel.css">
  <link rel="stylesheet" href="css/panels/notes-panel.css">
  <link rel="stylesheet" href="css/panels/settings-panel.css">
</head>
<body>
  <div class="app">
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <button class="sidebar-title" id="btn-home" type="button">Dungeon Master</button>
        <button class="sidebar-collapse" id="btn-collapse" type="button" aria-label="收起侧边栏" title="收起">
          <svg width="20" height="20" viewBox="0 0 18 18" fill="none" aria-hidden="true">
            <rect x="1" y="2" width="16" height="14" rx="2" stroke="currentColor" stroke-width="1.5"/>
            <line x1="6" y1="2" x2="6" y2="16" stroke="currentColor" stroke-width="1.5"/>
          </svg>
        </button>
      </div>

      <nav class="sidebar-nav">
        <section class="nav-section">
          <div class="section-header">
            <span class="nav-icon">+</span>
            <span class="section-title">新的冒险</span>
          </div>
          <button class="nav-item nav-sub" id="btn-from-scratch" type="button">
            <span class="nav-icon nav-icon-sm">□</span>
            <span class="nav-label">从零开始</span>
          </button>
          <button class="nav-item nav-sub" id="btn-templates" type="button">
            <span class="nav-icon nav-icon-sm">★</span>
            <span class="nav-label">现有模板</span>
          </button>
        </section>

        <section class="nav-section saves-section">
          <div class="section-header">
            <span class="nav-icon nav-icon-sm">📁</span>
            <span class="section-title">游戏存档</span>
          </div>
          <div class="search-box">
            <span class="search-icon" aria-hidden="true">🔍</span>
            <input type="search" id="save-search" placeholder="搜索存档..." autocomplete="off">
          </div>
          <ul class="save-list" id="save-list"></ul>
        </section>
      </nav>

      <div class="sidebar-footer">
        <div class="save-item consult-item">
          <div class="save-item-row consult-item-row">
            <button class="nav-item consult-btn" id="btn-consult" type="button">
              <span class="nav-icon">?</span>
              <span class="nav-label">咨询城主</span>
            </button>
            <button type="button" class="save-menu-btn consult-clear-btn" id="btn-consult-clear" aria-label="清除对话记录">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
                <path d="M18 2l4 4-12 12H6v-4L18 2z"></path>
                <path d="M2 22h8"></path>
              </svg>
            </button>
          </div>
        </div>
        <div class="footer-row">
          <div class="save-item account-item">
            <div class="save-item-row account-item-row">
              <button class="save-item-btn account-btn" id="btn-account" type="button">
                <span class="avatar" id="avatar">A</span>
                <span class="nav-label" id="account-label">开发者</span>
              </button>
              <button type="button" class="save-menu-btn account-menu-btn" id="btn-account-options" aria-label="账户选项">⋮</button>
            </div>
          </div>
        </div>
      </div>
    </aside>

    <main class="main-content" id="main-content"></main>
  </div>

  <div class="dropdown-menu hidden" id="save-menu" role="menu">
    <button type="button" data-action="pin" role="menuitem">
      <span class="menu-icon">📌</span> 固定
    </button>
    <button type="button" data-action="copy" role="menuitem">
      <span class="menu-icon">📋</span> 复制
    </button>
    <button type="button" data-action="rename" role="menuitem">
      <span class="menu-icon">✏</span> 重命名
    </button>
    <button type="button" data-action="delete" role="menuitem" class="danger">
      <span class="menu-icon">🗑</span> 删除
    </button>
  </div>

  <div class="modal-overlay hidden" id="delete-modal">
    <div class="modal">
      <h2>删除存档</h2>
      <p id="delete-message">确定要删除此存档吗？此操作无法撤销。</p>
      <div class="modal-actions">
        <button type="button" class="btn btn-secondary" id="btn-cancel-delete">取消</button>
        <button type="button" class="btn btn-danger" id="btn-confirm-delete">删除</button>
      </div>
    </div>
  </div>

  <div class="modal-overlay hidden" id="clear-consult-modal">
    <div class="modal">
      <p id="clear-consult-message">确认清除所有的历史记录吗？</p>
      <div class="modal-actions">
        <button type="button" class="btn btn-secondary" id="btn-cancel-clear-consult">取消</button>
        <button type="button" class="btn btn-danger" id="btn-confirm-clear-consult">清除</button>
      </div>
    </div>
  </div>

  <div class="dropdown-menu hidden" id="account-menu" role="menu">
    <button type="button" data-mode="developer" role="menuitem">开发者</button>
    <button type="button" data-mode="guest" role="menuitem">游客</button>
  </div>

  <div class="dropdown-menu hidden" id="account-options-menu" role="menu">
    <button type="button" data-action="placeholder-1" role="menuitem">占位符 1</button>
    <button type="button" data-action="placeholder-2" role="menuitem">占位符 2</button>
    <button type="button" data-action="placeholder-3" role="menuitem">占位符 3</button>
  </div>

  <script src="js/theme.js"></script>
  <script src="js/game-data.js"></script>
  <script src="js/llm/config.js"></script>
  <script src="js/llm/channels.js"></script>
  <script src="js/llm/client.js"></script>
  <script src="js/llm/chat-service.js"></script>
  <script src="js/vendor/marked.min.js"></script>
  <script src="js/vendor/purify.min.js"></script>
  <script src="js/markdown.js?v=7"></script>
  <script src="js/chat.js?v=10"></script>
  <script src="js/panels/panel-common.js"></script>
  <script src="js/panels/character-panel.js"></script>
  <script src="js/panels/backpack-panel.js"></script>
  <script src="js/panels/status-panel.js"></script>
  <script src="js/panels/world-panel.js"></script>
  <script src="js/panels/notes-panel.js"></script>
  <script src="js/panels/settings-panel.js"></script>
  <script src="js/top-bar.js"></script>
  <script src="templates/game-template.js"></script>
  <script src="templates/chat-template.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
