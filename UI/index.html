<!DOCTYPE html>
<html lang="zh-CN" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dungeon Master</title>
  <link rel="stylesheet" href="css/main.css">
  <link rel="stylesheet" href="css/chat.css">
</head>
<body>
  <div class="app">
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <button class="sidebar-title" id="btn-home" type="button">Dungeon Master</button>
        <button class="sidebar-collapse" id="btn-collapse" type="button" aria-label="收起侧边栏" title="收起">
          <svg width="20" height="20" viewBox="0 0 18 18" fill="none" aria-hidden="true">
            <rect x="1" y="2" width="16" height="14" rx="2" stroke="currentColor" stroke-width="1.5"/>
            <line x1="6" y1="2" x2="6" y2="16" stroke="currentColor" stroke-width="1.5"/>
          </svg>
        </button>
      </div>

      <nav class="sidebar-nav">
        <section class="nav-section">
          <div class="section-header">
            <span class="nav-icon">+</span>
            <span class="section-title">新的冒险</span>
          </div>
          <button class="nav-item nav-sub" id="btn-from-scratch" type="button">
            <span class="nav-icon nav-icon-sm">□</span>
            <span class="nav-label">从零开始</span>
          </button>
          <button class="nav-item nav-sub" id="btn-templates" type="button">
            <span class="nav-icon nav-icon-sm">★</span>
            <span class="nav-label">现有模板</span>
          </button>
        </section>

        <section class="nav-section saves-section">
          <div class="section-header">
            <span class="nav-icon nav-icon-sm">📁</span>
            <span class="section-title">游戏存档</span>
          </div>
          <div class="search-box">
            <span class="search-icon" aria-hidden="true">🔍</span>
            <input type="search" id="save-search" placeholder="搜索存档..." autocomplete="off">
          </div>
          <ul class="save-list" id="save-list"></ul>
        </section>
      </nav>

      <div class="sidebar-footer">
        <button class="nav-item" id="btn-consult" type="button">
          <span class="nav-icon">?</span>
          <span class="nav-label">咨询城主</span>
        </button>
        <div class="footer-row">
          <button class="nav-item account-btn" id="btn-account" type="button">
            <span class="avatar" id="avatar">A</span>
            <span class="nav-label" id="account-label">开发者</span>
          </button>
          <button class="theme-toggle" id="btn-theme" type="button" aria-label="切换外观" title="切换外观">
            <span id="theme-icon">☀</span>
          </button>
        </div>
      </div>
    </aside>

    <main class="main-content" id="main-content"></main>
  </div>

  <div class="dropdown-menu hidden" id="save-menu" role="menu">
    <button type="button" data-action="pin" role="menuitem">
      <span class="menu-icon">📌</span> 固定
    </button>
    <button type="button" data-action="copy" role="menuitem">
      <span class="menu-icon">📋</span> 复制
    </button>
    <button type="button" data-action="rename" role="menuitem">
      <span class="menu-icon">✏</span> 重命名
    </button>
    <button type="button" data-action="delete" role="menuitem" class="danger">
      <span class="menu-icon">🗑</span> 删除
    </button>
  </div>

  <div class="modal-overlay hidden" id="delete-modal">
    <div class="modal">
      <h2>删除存档</h2>
      <p id="delete-message">确定要删除此存档吗？此操作无法撤销。</p>
      <div class="modal-actions">
        <button type="button" class="btn btn-secondary" id="btn-cancel-delete">取消</button>
        <button type="button" class="btn btn-danger" id="btn-confirm-delete">删除</button>
      </div>
    </div>
  </div>

  <div class="dropdown-menu hidden" id="account-menu" role="menu">
    <button type="button" data-mode="developer" role="menuitem">开发者</button>
    <button type="button" data-mode="guest" role="menuitem">游客</button>
  </div>

  <div class="dropdown-menu hidden" id="theme-menu" role="menu">
    <button type="button" data-theme="dark" role="menuitem">黑夜模式</button>
    <button type="button" data-theme="light" role="menuitem">白天模式</button>
  </div>

  <script src="js/chat.js"></script>
  <script src="js/top-bar.js"></script>
  <script src="templates/game-template.js"></script>
  <script src="templates/chat-template.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
